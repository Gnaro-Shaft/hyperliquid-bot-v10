# fly.toml — hyperliquid-bot-v10 (worker, pas de service HTTP)
app = 'hyperliquid-bot-v10'
primary_region = 'ams'   # aligné sur le déploiement Launch UI du 10/07

# IMPORTANT : PAS de [http_service] — c'est un WORKER (aucun port HTTP).
# La Launch UI de Fly en avait injecté un avec auto_stop_machines=true :
# le proxy ne voyant jamais de trafic, il éteignait le bot. Une seule
# machine, toujours allumée, restart always.

[build]

[env]
  DEBUG = 'true'
  PYTHONUNBUFFERED = '1'

[processes]
  app = "python main.py"

[[restart]]
  policy = 'always'
  max_retries = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpus = 1
  memory_mb = 512
  auto_stop = false
  auto_start = true
